<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Agendamento de Exames</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
    }

    h1, h2 {
      text-align: center;
    }

    label {
      font-size: 20px;
      display: block;
      margin-top: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 30px;
      cursor: pointer;
    }

    button:hover {
      background: #1a5fb4;
    }

    .hidden {
      display: none;
    }

    .confirmacao {
      font-size: 20px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Agendamento de Exames</h1>

  <!-- ETAPA 1 -->
  <div id="etapa1">
    <label>Nome completo</label>
    <input id="nome" />

    <label>WhatsApp</label>
    <input id="whatsapp" placeholder="(xx) xxxxx-xxxx"/>

    <button onclick="proximaEtapa()">Continuar</button>
  </div>

  <!-- ETAPA 2 -->
  <div id="etapa2" class="hidden">
    <h2>Escolha os exames</h2>

    <label>Teste de Força</label>
    <select id="forca">
      <option value="">Selecione</option>
      <option>31/08/2026 - 11:00</option>
      <option>31/08/2026 - 11:20</option>
      <option>31/08/2026 - 11:40</option>
      <option>05/10/2026 - 09:00</option>
      <option>05/10/2026 - 09:20</option>
    </select>

    <label>Composição Corporal</label>
    <select id="composicao">
      <option value="">Selecione</option>
      <option>03/09/2026 - 09:00</option>
      <option>03/09/2026 - 09:20</option>
      <option>16/10/2026 - 10:00</option>
    </select>

    <label>Teste Cardiorrespiratório</label>
    <select id="cardio">
      <option value="">Selecione</option>
      <option>01/09/2026 - 15:00</option>
      <option>01/09/2026 - 15:20</option>
      <option>15/10/2026 - 10:00</option>
    </select>

    <label>Exame de Sangue</label>
    <select id="sangue">
      <option value="">Selecione</option>
      <option>10/09/2026 - Manhã</option>
      <option>17/09/2026 - Manhã</option>
      <option>25/09/2026 - Manhã</option>
    </select>

    <button onclick="finalizar()">Finalizar agendamento</button>
  </div>

  <!-- ETAPA 3 -->
  <div id="etapa3" class="hidden">
    <h2>Confirmação</h2>
    <div class="confirmacao" id="resumo"></div>
  </div>

</div>

<script>
  function proximaEtapa() {
    document.getElementById("etapa1").classList.add("hidden");
    document.getElementById("etapa2").classList.remove("hidden");
  }

  function finalizar() {
    const resumo = `
      <strong>Nome:</strong> ${nome.value}<br>
      <strong>WhatsApp:</strong> ${whatsapp.value}<br><br>

      <strong>Teste de Força:</strong> ${forca.value}<br>
      <strong>Composição Corporal:</strong> ${composicao.value}<br>
      <strong>Cardiorrespiratório:</strong> ${cardio.value}<br>
      <strong>Exame de Sangue:</strong> ${sangue.value}
    `;

    document.getElementById("etapa2").classList.add("hidden");
    document.getElementById("etapa3").classList.remove("hidden");
    document.getElementById("resumo").innerHTML = resumo;
  }
</script>

</body>
</html>
